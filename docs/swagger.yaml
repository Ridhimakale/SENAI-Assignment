components:
  schemas:
    ActionStatus:
      type: string
      enum:
      - Proposed
      - Executed
      - Blocked
      - Failed
      title: ActionStatus
    ActionSummaryResponse:
      properties:
        id:
          type: integer
          title: Id
        email_id:
          type: integer
          title: Email Id
        action_type:
          $ref: '#/components/schemas/ActionType'
        status:
          $ref: '#/components/schemas/ActionStatus'
        proposed_content:
          anyOf:
          - type: string
          - type: 'null'
          title: Proposed Content
        is_approved:
          type: boolean
          title: Is Approved
        approved_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Approved By
        executed_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Executed At
        safety_block_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Safety Block Reason
        agent_reasoning_log:
          anyOf:
          - items: {}
            type: array
          - type: object
          - type: 'null'
          title: Agent Reasoning Log
        tool_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Tool Name
        tool_input:
          anyOf:
          - type: object
          - type: 'null'
          title: Tool Input
        tool_output:
          anyOf:
          - type: object
          - type: 'null'
          title: Tool Output
      type: object
      required:
      - id
      - email_id
      - action_type
      - status
      - proposed_content
      - is_approved
      - approved_by
      - executed_at
      - safety_block_reason
      - agent_reasoning_log
      - tool_name
      - tool_input
      - tool_output
      title: ActionSummaryResponse
    ActionType:
      type: string
      enum:
      - Auto-Reply
      - Escalate
      - Legal-Flag
      - Ticket-Created
      - Ignored
      title: ActionType
    AgentPerformanceResponse:
      properties:
        total_actions:
          type: integer
          title: Total Actions
        auto_reply_count:
          type: integer
          title: Auto Reply Count
        escalation_count:
          type: integer
          title: Escalation Count
        auto_reply_rate:
          type: number
          title: Auto Reply Rate
        escalation_rate:
          type: number
          title: Escalation Rate
        average_confidence_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Average Confidence Score
      type: object
      required:
      - total_actions
      - auto_reply_count
      - escalation_count
      - auto_reply_rate
      - escalation_rate
      - average_confidence_score
      title: AgentPerformanceResponse
    AgentRunResponse:
      properties:
        email_id:
          type: integer
          title: Email Id
        dry_run:
          type: boolean
          title: Dry Run
        reasoning_trace:
          items:
            $ref: '#/components/schemas/ReasoningStep'
          type: array
          title: Reasoning Trace
        proposed_actions:
          items:
            $ref: '#/components/schemas/ProposedAction'
          type: array
          title: Proposed Actions
        draft_preview:
          anyOf:
          - type: string
          - type: 'null'
          title: Draft Preview
        tool_call_count:
          type: integer
          title: Tool Call Count
        max_tool_calls:
          type: integer
          title: Max Tool Calls
        final_status:
          type: string
          title: Final Status
      type: object
      required:
      - email_id
      - dry_run
      - reasoning_trace
      - proposed_actions
      - tool_call_count
      - max_tool_calls
      - final_status
      title: AgentRunResponse
    ApiResponse_ActionSummaryResponse_:
      properties:
        success:
          type: boolean
          title: Success
          default: true
        data:
          $ref: '#/components/schemas/ActionSummaryResponse'
        meta:
          type: object
          title: Meta
      type: object
      required:
      - data
      title: ApiResponse[ActionSummaryResponse]
    ApiResponse_AgentPerformanceResponse_:
