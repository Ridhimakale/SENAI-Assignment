services:
  postgres:
    image: postgres:15-alpine
    container_name: senai-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: senai_crm
    ports:
      - "5432:5432"
    volumes:
      - senai_crm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d senai_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  senai_crm_postgres_data:
